<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля - Школьный портал</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            margin: 0;
        }
        
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6 min-h-screen">
    
    <div class="card p-8 sm:p-10 md:pt-12 md:pb-10 md:px-10 w-full max-w-md mx-auto">
        
        <div class="flex flex-col items-center text-center space-y-6 sm:space-y-8">
            
            <!-- Кнопка назад -->
            <div class="w-full">
                <div class="space-y-4 sm:space-y-6">
                    <button type="button" onclick="window.history.back()" class="flex items-center gap-2 text-sm text-slate-500 hover:text-slate-700 font-medium transition-colors -mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left h-4 w-4">
                            <path d="m12 19-7-7 7-7"></path>
                            <path d="M19 12H5"></path>
                        </svg>
                        Вернуться к входу в систему
                    </button>

                    <!-- Заголовок -->
                    <div class="text-center space-y-2">
                        <h2 class="text-xl sm:text-2xl font-bold text-slate-900">
                            Сбросить пароль
                        </h2>
                        <p class="text-slate-600 text-sm sm:text-base">
                            Введите свой адрес электронной почты, и мы отправим вам ссылку для сброса пароля
                        </p>
                    </div>

                    <!-- Форма -->
                    <form class="space-y-4 sm:space-y-5" id="resetForm">
                        <div class="space-y-1.5">
                            <label class="peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-sm font-medium text-slate-700 block text-center" for="email">
                                Электронная почта
                            </label>
                            <div class="relative">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-slate-400">
                                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                </svg>
                                <input type="email" 
                                       class="flex w-full border px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 h-10 sm:h-11 bg-slate-50/50 border-slate-200 focus:border-slate-400 focus:ring-slate-400 rounded-xl placeholder:text-slate-400" 
                                       id="email" 
                                       placeholder="you@example.com" 
                                       required>
                            </div>
                        </div>
                        
                        <button class="inline-flex items-center justify-center gap-1 whitespace-nowrap text-sm ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 px-3 py-2 w-full h-10 sm:h-11 bg-slate-900 hover:bg-slate-800 text-white font-medium shadow-sm rounded-xl transition-all duration-200" 
                                type="submit">
                            Отправить ссылку для сброса
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Обработка формы сброса пароля
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            
            if (!email || !validateEmail(email)) {
                alert('Пожалуйста, введите корректный email');
                return;
            }
            
            // Показать сообщение об успехе
            alert(`Инструкции по сбросу пароля отправлены на ${email}`);
            
            // Перенаправить на страницу входа через 2 секунды
            setTimeout(() => {
                window.location.href = 'index.html'; // или 'login.html'
            }, 2000);
        });
        
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
