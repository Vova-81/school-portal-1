<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Объявления</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* === БАЗОВЫЕ СТИЛИ === */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #64748b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* === HEADER === */
        .page-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 14px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--surface);
            transition: var(--transition);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        /* === ФИЛЬТРЫ === */
        .filters-section {
            margin-bottom: 30px;
        }
        
        .filters-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        
        .filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        
        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }
        
        .filter-pill:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        
        .filter-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        
        /* === КАТЕГОРИИ И ТИПЫ === */
        .category-student {
            background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
            border-color: #bae6fd;
            color: #0369a1;
        }
        
        .category-teacher {
            background: linear-gradient(135deg, #fef3c7, #fefce8);
            border-color: #fde68a;
            color: #92400e;
        }
        
        .category-parent {
            background: linear-gradient(135deg, #f3e8ff, #faf5ff);
            border-color: #e9d5ff;
            color: #7c3aed;
        }
        
        .type-announcement {
            background: linear-gradient(135deg, #dcfce7, #f0fdf4);
            border-color: #bbf7d0;
            color: #166534;
        }
        
        .type-news {
            background: linear-gradient(135deg, #fef3c7, #fefce8);
            border-color: #fde68a;
            color: #92400e;
        }
        
        .type-event {
            background: linear-gradient(135deg, #fce7f3, #fdf2f8);
            border-color: #fbcfe8;
            color: #be185d;
        }
        
        .status-pinned {
            background: linear-gradient(135deg, #fef3c7, #fefce8);
            color: #92400e;
            border: none;
        }
        
        .status-urgent {
            background: linear-gradient(135deg, #fee2e2, #fef2f2);
            color: #dc2626;
            border: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        /* === КАРТОЧКИ === */
        .announcements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        @media (max-width: 768px) {
            .announcements-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .announcement-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        
        .announcement-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }
        
        .announcement-card.urgent {
            border: 2px solid #ef4444;
        }
        
        .announcement-card.pinned {
            border: 2px solid #f59e0b;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            flex: 1;
        }
        
        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .card-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .card-content {
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid rgba(226, 232, 240, 0.5);
        }
        
        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .author-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }
        
        .author-details h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        
        .author-details p {
            font-size: 12px;
            color: var(--text-light);
        }
        
        .card-date {
            font-size: 13px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* === МОДАЛЬНОЕ ОКНО === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--surface);
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0);
            opacity: 1;
        }
        
        .modal-header {
            padding: 28px 28px 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: #f3f4f6;
            color: #6b7280;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: var(--transition);
            z-index: 10;
        }
        
        .modal-close:hover {
            background: #ef4444;
            color: white;
            transform: rotate(90deg);
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 16px;
            padding-right: 50px;
        }
        
        .modal-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .modal-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal-author .author-avatar {
            width: 40px;
            height: 40px;
            font-size: 14px;
        }
        
        .modal-author-info h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        
        .modal-author-info p {
            font-size: 13px;
            color: var(--text-light);
        }
        
        .modal-date {
            font-size: 14px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .modal-tags {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .modal-content {
            padding: 28px;
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-light);
        }
        
        .modal-content p {
            margin-bottom: 16px;
        }
        
        .modal-content p:last-child {
            margin-bottom: 0;
        }
        
        /* === СЕКЦИИ === */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title i {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 16px;
        }
        
        /* === ПУСТОЕ СОСТОЯНИЕ === */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        
        .empty-state i {
            font-size: 48px;
            color: var(--border);
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .empty-state p {
            color: var(--text-light);
            font-size: 14px;
        }
        
        /* === СКРОЛЛБАР === */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <!-- ХЕДЕР -->
    <header class="page-header">
        <div class="container">
            <div class="header-content">
                <h1 class="page-title">
                    <i class="fas fa-bullhorn"></i>
                    Объявления
                </h1>
                
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput"
                        placeholder="Поиск объявлений..."
                    >
                </div>
            </div>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="container">
        <!-- ФИЛЬТРЫ -->
        <section class="filters-section">
            <div class="filters-title">Фильтры</div>
            <div class="filters-container">
                <div class="filter-pill active" data-filter="all">
                    <i class="fas fa-layer-group"></i>
                    Все
                </div>
                <div class="filter-pill category-student" data-filter="category:students">
                    <i class="fas fa-graduation-cap"></i>
                    Ученикам
                </div>
                <div class="filter-pill category-teacher" data-filter="category:teachers">
                    <i class="fas fa-chalkboard-teacher"></i>
                    Учителям
                </div>
                <div class="filter-pill category-parent" data-filter="category:parents">
                    <i class="fas fa-users"></i>
                    Родителям
                </div>
                <div class="filter-pill type-announcement" data-filter="type:announcement">
                    <i class="fas fa-bullhorn"></i>
                    Объявления
                </div>
                <div class="filter-pill type-news" data-filter="type:news">
                    <i class="fas fa-newspaper"></i>
                    Новости
                </div>
                <div class="filter-pill type-event" data-filter="type:event">
                    <i class="fas fa-calendar-alt"></i>
                    Мероприятия
                </div>
                <div class="filter-pill status-pinned" data-filter="pinned">
                    <i class="fas fa-thumbtack"></i>
                    Закреплённые
                </div>
                <div class="filter-pill status-urgent" data-filter="urgent">
                    <i class="fas fa-bolt"></i>
                    Срочные
                </div>
            </div>
        </section>

        <!-- ЗАКРЕПЛЁННЫЕ -->
        <h2 class="section-title">
            <i class="fas fa-thumbtack"></i>
            Закреплённые
        </h2>
        <div class="announcements-grid" id="pinnedList"></div>

        <!-- ВСЕ ОБЪЯВЛЕНИЯ -->
        <h2 class="section-title">
            <i class="fas fa-list"></i>
            Все объявления
        </h2>
        <div class="announcements-grid" id="announcementsList"></div>

        <!-- ПУСТОЕ СОСТОЯНИЕ -->
        <div id="emptyState" style="display: none;">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <h3>Ничего не найдено</h3>
                <p>Попробуйте изменить параметры поиска</p>
            </div>
        </div>
    </main>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <button class="modal-close" id="modalClose">&times;</button>
                
                <h2 class="modal-title" id="modalTitle">Заголовок объявления</h2>
                
                <div class="modal-meta">
                    <div class="modal-author">
                        <div class="author-avatar" id="modalAvatar">АВ</div>
                        <div class="modal-author-info">
                            <h4 id="modalAuthor">Автор</h4>
                            <p id="modalPosition">Должность</p>
                        </div>
                    </div>
                    
                    <div class="modal-date">
                        <i class="far fa-calendar"></i>
                        <span id="modalDate">Дата</span>
                    </div>
                </div>
                
                <div class="modal-tags" id="modalTags"></div>
            </div>
            
            <div class="modal-content" id="modalContent">
                <p>Содержимое объявления...</p>
            </div>
        </div>
    </div>

    <script>
// ========== КОНФИГУРАЦИЯ API ==========
const API_BASE_URL = 'http://localhost:3000';
let currentAnnouncementId = null;

// Состояние фильтров
let state = {
    category: 'all',
    type: 'all',
    urgent: false,
    pinned: false,
    search: ''
};

// Элементы DOM
const elements = {
    searchInput: document.getElementById('searchInput'),
    filterPills: document.querySelectorAll('.filter-pill'),
    pinnedList: document.getElementById('pinnedList'),
    announcementsList: document.getElementById('announcementsList'),
    emptyState: document.getElementById('emptyState'),
    
    // Модалка просмотра
    modalOverlay: document.getElementById('modalOverlay'),
    modalClose: document.getElementById('modalClose'),
    modalTitle: document.getElementById('modalTitle'),
    modalAvatar: document.getElementById('modalAvatar'),
    modalAuthor: document.getElementById('modalAuthor'),
    modalPosition: document.getElementById('modalPosition'),
    modalDate: document.getElementById('modalDate'),
    modalTags: document.getElementById('modalTags'),
    modalContent: document.getElementById('modalContent')
};

// ========== ФУНКЦИИ API ==========

// Загрузить все объявления
async function loadAnnouncements() {
    try {
        const response = await fetch(`${API_BASE_URL}/api/announcements`);
        if (!response.ok) throw new Error('Ошибка сервера');
        
        const announcements = await response.json();
        renderAnnouncements(announcements);
    } catch (error) {
        console.error('Ошибка загрузки:', error);
        showError('Не удалось загрузить объявления');
    }
}

// Удалить объявление
async function deleteAnnouncement(id) {
    if (!confirm('Удалить это объявление?')) return;
    
    try {
        const response = await fetch(`${API_BASE_URL}/api/announcements/${id}`, {
            method: 'DELETE'
        });
        
        const result = await response.json();
        
        if (result.success) {
            showSuccess('Объявление удалено');
            await loadAnnouncements();
            closeModal();
        } else {
            showError(result.error || 'Ошибка удаления');
        }
    } catch (error) {
        console.error('Ошибка:', error);
        showError('Не удалось удалить объявление');
    }
}

// ========== РЕНДЕРИНГ ==========

function renderAnnouncements(announcements) {
    // Фильтрация
    let filtered = announcements.filter(ann => {
        if (state.search) {
            const searchTerm = state.search.toLowerCase();
            if (!ann.title.toLowerCase().includes(searchTerm) && 
                !ann.content.toLowerCase().includes(searchTerm)) {
                return false;
            }
        }
        
        if (state.category !== 'all' && ann.category !== state.category) {
            return false;
        }
        
        if (state.type !== 'all' && ann.type !== state.type) {
            return false;
        }
        
        if (state.urgent && !ann.urgent) return false;
        if (state.pinned && !ann.pinned) return false;
        
        return true;
    });
    
    // Разделение на закреплённые и обычные
    const pinned = filtered.filter(a => a.pinned);
    const regular = filtered.filter(a => !a.pinned);
    
    // Очистка контейнеров
    elements.pinnedList.innerHTML = '';
    elements.announcementsList.innerHTML = '';
    
    // Рендер закреплённых
    if (pinned.length > 0) {
        pinned.forEach(announcement => {
            elements.pinnedList.innerHTML += createCardHTML(announcement);
        });
    }
    
    // Рендер обычных
    if (regular.length > 0) {
        regular.forEach(announcement => {
            elements.announcementsList.innerHTML += createCardHTML(announcement);
        });
    }
    
    // Показ/скрытие пустого состояния
    if (filtered.length === 0) {
        elements.emptyState.style.display = 'block';
    } else {
        elements.emptyState.style.display = 'none';
    }
    
    // Добавляем обработчики на карточки
    addCardListeners();
}

function createCardHTML(announcement) {
    const cardClass = `announcement-card ${announcement.pinned ? 'pinned' : ''} ${announcement.urgent ? 'urgent' : ''}`;
    const categoryClass = `card-tag category-${announcement.category}`;
    const typeClass = `card-tag type-${announcement.type}`;
    
    // Форматирование даты
    const date = new Date(announcement.created_at);
    const formattedDate = date.toLocaleDateString('ru-RU', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
    });
    
    // Обрезаем текст для карточки
    const shortContent = announcement.content.length > 120 
        ? announcement.content.substring(0, 120) + '...' 
        : announcement.content;
    
    // Получаем инициалы автора
    const initials = announcement.author 
        ? announcement.author.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2)
        : 'АВ';
    
    return `
        <div class="${cardClass}" data-id="${announcement.id}">
            <div class="card-header">
                <h3 class="card-title">${announcement.title}</h3>
                <div class="card-tags">
                    ${announcement.pinned ? '<span class="card-tag status-pinned"><i class="fas fa-thumbtack"></i></span>' : ''}
                    ${announcement.urgent ? '<span class="card-tag status-urgent"><i class="fas fa-bolt"></i></span>' : ''}
                    <span class="${categoryClass}">${getCategoryLabel(announcement.category)}</span>
                    <span class="${typeClass}">${getTypeLabel(announcement.type)}</span>
                </div>
            </div>
            <p class="card-content">${shortContent}</p>
            <div class="card-footer">
                <div class="author-info">
                    <div class="author-avatar">${initials}</div>
                    <div class="author-details">
                        <h4>${announcement.author || 'Администрация'}</h4>
                        <p>${announcement.position || ''}</p>
                    </div>
                </div>
                <div class="card-date">
                    <i class="far fa-calendar"></i>
                    ${formattedDate}
                </div>
            </div>
        </div>
    `;
}

function getCategoryLabel(category) {
    const labels = {
        'students': 'Ученикам',
        'teachers': 'Учителям',
        'parents': 'Родителям',
        'all': 'Для всех'
    };
    return labels[category] || category;
}

function getTypeLabel(type) {
    const labels = {
        'announcement': 'Объявление',
        'news': 'Новость',
        'event': 'Мероприятие'
    };
    return labels[type] || type;
}

function addCardListeners() {
    document.querySelectorAll('.announcement-card').forEach(card => {
        card.addEventListener('click', function() {
            const id = parseInt(this.dataset.id);
            openAnnouncementModal(id);
        });
    });
}

// ========== МОДАЛЬНОЕ ОКНО ==========

async function openAnnouncementModal(id) {
    try {
        const response = await fetch(`${API_BASE_URL}/api/announcements`);
        const announcements = await response.json();
        const announcement = announcements.find(a => a.id === id);
        
        if (!announcement) {
            showError('Объявление не найдено');
            return;
        }
        
        // Заполняем модалку
        elements.modalTitle.textContent = announcement.title;
        
        // Инициалы автора
        const initials = announcement.author 
            ? announcement.author.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2)
            : 'АВ';
        elements.modalAvatar.textContent = initials;
        
        elements.modalAuthor.textContent = announcement.author || 'Администрация';
        elements.modalPosition.textContent = announcement.position || '';
        
        // Форматирование даты
        const date = new Date(announcement.created_at);
        const formattedDate = date.toLocaleDateString('ru-RU', {
            day: 'numeric',
            month: 'long',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        elements.modalDate.textContent = formattedDate;
        
        // Содержимое
        elements.modalContent.innerHTML = `<p>${announcement.content}</p>`;
        
        // Теги
        let tagsHTML = '';
        tagsHTML += `<span class="card-tag category-${announcement.category}">${getCategoryLabel(announcement.category)}</span>`;
        tagsHTML += `<span class="card-tag type-${announcement.type}">${getTypeLabel(announcement.type)}</span>`;
        if (announcement.pinned) {
            tagsHTML += '<span class="card-tag status-pinned"><i class="fas fa-thumbtack"></i></span>';
        }
        if (announcement.urgent) {
            tagsHTML += '<span class="card-tag status-urgent"><i class="fas fa-bolt"></i></span>';
        }
        elements.modalTags.innerHTML = tagsHTML;
        
        // Сохраняем ID для возможных действий
        currentAnnouncementId = id;
        
        // Показываем модалку
        elements.modalOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        
    } catch (error) {
        console.error('Ошибка загрузки объявления:', error);
        showError('Не удалось загрузить объявление');
    }
}

function closeModal() {
    elements.modalOverlay.classList.remove('active');
    document.body.style.overflow = 'auto';
    currentAnnouncementId = null;
}

// ========== ОБРАБОТКА URL ПАРАМЕТРОВ ==========

function applyUrlFilters() {
    const urlParams = new URLSearchParams(window.location.search);
    const filterParam = urlParams.get('filter');
    
    if (!filterParam) return;
    
    console.log('🔗 Применяем фильтр из URL:', filterParam);
    
    // Разбираем параметр: "category:students"
    const [filterType, filterValue] = filterParam.split(':');
    
    if (filterType === 'category') {
        // Находим кнопку фильтра
        const filterBtn = document.querySelector(`[data-filter="category:${filterValue}"]`);
        
        if (filterBtn) {
            // Сбрасываем все фильтры
            resetFilters();
            
            // Активируем нужный фильтр
            state.category = filterValue;
            filterBtn.classList.add('active');
            
            console.log('✅ Фильтр применен:', state);
        }
    }
    
    // После применения фильтров загружаем объявления
    loadAnnouncements();
}

// ========== УТИЛИТЫ ==========

function showSuccess(message) {
    alert('✅ ' + message);
}

function showError(message) {
    alert('❌ ' + message);
}

function resetFilters() {
    state = {
        category: 'all',
        type: 'all',
        urgent: false,
        pinned: false,
        search: ''
    };
    
    elements.searchInput.value = '';
    elements.filterPills.forEach(pill => {
        pill.classList.remove('active');
        if (pill.dataset.filter === 'all') {
            pill.classList.add('active');
        }
    });
}

// ========== ИНИЦИАЛИЗАЦИЯ ==========

document.addEventListener('DOMContentLoaded', function() {
    // Загружаем объявления
    loadAnnouncements();
    
    // Применяем фильтры из URL (ЕСЛИ ЕСТЬ)
    applyUrlFilters();
    
    // Поиск
    elements.searchInput.addEventListener('input', function(e) {
        state.search = e.target.value.toLowerCase().trim();
        loadAnnouncements();
    });
    
    // Фильтры
    elements.filterPills.forEach(pill => {
        pill.addEventListener('click', function() {
            const filter = this.dataset.filter;
            
            if (filter === 'all') {
                elements.filterPills.forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                resetFilters();
            } else {
                // Снимаем активность с "Все"
                document.querySelector('[data-filter="all"]').classList.remove('active');
                
                // Переключаем текущую кнопку
                this.classList.toggle('active');
                
                // Обновляем состояние фильтров
                if (filter.startsWith('category:')) {
                    state.category = this.classList.contains('active') ? filter.split(':')[1] : 'all';
                } else if (filter.startsWith('type:')) {
                    state.type = this.classList.contains('active') ? filter.split(':')[1] : 'all';
                } else if (filter === 'urgent') {
                    state.urgent = this.classList.contains('active');
                } else if (filter === 'pinned') {
                    state.pinned = this.classList.contains('active');
                }
            }
            
            // Применяем фильтры
            loadAnnouncements();
        });
    });
    
    // Модальное окно
    elements.modalClose.addEventListener('click', closeModal);
    elements.modalOverlay.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });
    
    // Авто-обновление каждые 30 секунд
    setInterval(loadAnnouncements, 30000);
});
</script>
</body>
