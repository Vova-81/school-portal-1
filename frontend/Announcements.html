<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Объявления</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* === БАЗОВЫЕ СТИЛИ === */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #64748b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* === HEADER === */
        .page-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 14px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--surface);
            transition: var(--transition);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        /* === ФИЛЬТРЫ === */
        .filters-section {
            margin-bottom: 30px;
        }
        
        .filters-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        
        .filters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        
        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }
        
        .filter-pill:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        
        .filter-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        
        /* === КАТЕГОРИИ И ТИПЫ === */
        .category-student {
            background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
            border-color: #bae6fd;
            color: #0369a1;
        }
        
        .category-teacher {
            background: linear-gradient(135deg, #fef3c7, #fefce8);
            border-color: #fde68a;
            color: #92400e;
        }
        
        .category-parent {
            background: linear-gradient(135deg, #f3e8ff, #faf5ff);
            border-color: #e9d5ff;
            color: #7c3aed;
        }
        
        .type-announcement {
            background: linear-gradient(135deg, #dcfce7, #f0fdf4);
            border-color: #bbf7d0;
            color: #166534;
        }
        
        .type-news {
            background: linear-gradient(135deg, #fef3c7, #fefce8);
            border-color: #fde68a;
            color: #92400e;
        }
        
        .type-event {
            background: linear-gradient(135deg, #fce7f3, #fdf2f8);
            border-color: #fbcfe8;
            color: #be185d;
        }
        
        .status-pinned {
            background: linear-gradient(135deg, #fef3c7, #fefce8);
            color: #92400e;
            border: none;
        }
        
        .status-urgent {
            background: linear-gradient(135deg, #fee2e2, #fef2f2);
            color: #dc2626;
            border: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        /* === КАРТОЧКИ === */
        .announcements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        @media (max-width: 768px) {
            .announcements-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .announcement-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        
        .announcement-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }
        
        .announcement-card.urgent {
            border: 2px solid #ef4444;
        }
        
        .announcement-card.pinned {
            border: 2px solid #f59e0b;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            flex: 1;
        }
        
        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .card-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .card-content {
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid rgba(226, 232, 240, 0.5);
        }
        
        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .author-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }
        
        .author-details h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        
        .author-details p {
            font-size: 12px;
            color: var(--text-light);
        }
        
        .card-date {
            font-size: 13px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* === МОДАЛЬНОЕ ОКНО === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--surface);
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0);
            opacity: 1;
        }
        
        .modal-header {
            padding: 28px 28px 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: #f3f4f6;
            color: #6b7280;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: var(--transition);
            z-index: 10;
        }
        
        .modal-close:hover {
            background: #ef4444;
            color: white;
            transform: rotate(90deg);
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 16px;
            padding-right: 50px;
        }
        
        .modal-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .modal-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modal-author .author-avatar {
            width: 40px;
            height: 40px;
            font-size: 14px;
        }
        
        .modal-author-info h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        
        .modal-author-info p {
            font-size: 13px;
            color: var(--text-light);
        }
        
        .modal-date {
            font-size: 14px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .modal-tags {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .modal-content {
            padding: 28px;
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-light);
        }
        
        .modal-content p {
            margin-bottom: 16px;
        }
        
        .modal-content p:last-child {
            margin-bottom: 0;
        }
        
        /* === СЕКЦИИ === */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title i {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 16px;
        }
        
        /* === ПУСТОЕ СОСТОЯНИЕ === */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        
        .empty-state i {
            font-size: 48px;
            color: var(--border);
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .empty-state p {
            color: var(--text-light);
            font-size: 14px;
        }
        
        /* === СКРОЛЛБАР === */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <!-- ХЕДЕР -->
    <header class="page-header">
        <div class="container">
            <div class="header-content">
                <h1 class="page-title">
                    <i class="fas fa-bullhorn"></i>
                    Объявления
                </h1>
                
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput"
                        placeholder="Поиск объявлений..."
                    >
                </div>
            </div>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="container">
        <!-- ФИЛЬТРЫ -->
        <section class="filters-section">
            <div class="filters-title">Фильтры</div>
            <div class="filters-container">
                <div class="filter-pill active" data-filter="all">
                    <i class="fas fa-layer-group"></i>
                    Все
                </div>
                <div class="filter-pill category-student" data-filter="category:students">
                    <i class="fas fa-graduation-cap"></i>
                    Ученикам
                </div>
                <div class="filter-pill category-teacher" data-filter="category:teachers">
                    <i class="fas fa-chalkboard-teacher"></i>
                    Учителям
                </div>
                <div class="filter-pill category-parent" data-filter="category:parents">
                    <i class="fas fa-users"></i>
                    Родителям
                </div>
                <div class="filter-pill type-announcement" data-filter="type:announcement">
                    <i class="fas fa-bullhorn"></i>
                    Объявления
                </div>
                <div class="filter-pill type-news" data-filter="type:news">
                    <i class="fas fa-newspaper"></i>
                    Новости
                </div>
                <div class="filter-pill type-event" data-filter="type:event">
                    <i class="fas fa-calendar-alt"></i>
                    Мероприятия
                </div>
                <div class="filter-pill status-pinned" data-filter="pinned">
                    <i class="fas fa-thumbtack"></i>
                    Закреплённые
                </div>
                <div class="filter-pill status-urgent" data-filter="urgent">
                    <i class="fas fa-bolt"></i>
                    Срочные
                </div>
            </div>
        </section>

        <!-- ЗАКРЕПЛЁННЫЕ -->
        <h2 class="section-title">
            <i class="fas fa-thumbtack"></i>
            Закреплённые
        </h2>
        <div class="announcements-grid" id="pinnedList"></div>

        <!-- ВСЕ ОБЪЯВЛЕНИЯ -->
        <h2 class="section-title">
            <i class="fas fa-list"></i>
            Все объявления
        </h2>
        <div class="announcements-grid" id="announcementsList"></div>

        <!-- ПУСТОЕ СОСТОЯНИЕ -->
        <div id="emptyState" style="display: none;">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <h3>Ничего не найдено</h3>
                <p>Попробуйте изменить параметры поиска</p>
            </div>
        </div>
    </main>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <button class="modal-close" id="modalClose">&times;</button>
                
                <h2 class="modal-title" id="modalTitle">Заголовок объявления</h2>
                
                <div class="modal-meta">
                    <div class="modal-author">
                        <div class="author-avatar" id="modalAvatar">АВ</div>
                        <div class="modal-author-info">
                            <h4 id="modalAuthor">Автор</h4>
                            <p id="modalPosition">Должность</p>
                        </div>
                    </div>
                    
                    <div class="modal-date">
                        <i class="far fa-calendar"></i>
                        <span id="modalDate">Дата</span>
                    </div>
                </div>
                
                <div class="modal-tags" id="modalTags"></div>
            </div>
            
            <div class="modal-content" id="modalContent">
                <p>Содержимое объявления...</p>
            </div>
        </div>
    </div>

    <script>
        // ДАННЫЕ
        const announcementsData = [
            {
                id: 1,
                title: "Родительское собрание",
                content: "Уважаемые родители! Приглашаем вас на родительское собрание, которое состоится 25 января в 18:00 в актовом зале школы. Будут обсуждаться вопросы успеваемости, подготовка к выпускным экзаменам и планы на следующий учебный год.",
                category: "parents",
                type: "announcement",
                author: "Иванова М.А.",
                position: "Директор школы",
                authorInitials: "МИ",
                date: "20 января 2024",
                pinned: true,
                urgent: false
            },
            {
                id: 2,
                title: "Отмена занятий",
                content: "В связи с ухудшением погодных условий, занятия 25 января отменяются. Информация о возобновлении занятий будет размещена дополнительно.",
                category: "students",
                type: "announcement",
                author: "Петров С.И.",
                position: "Заместитель директора",
                authorInitials: "ПС",
                date: "24 января 2024",
                pinned: false,
                urgent: true
            },
            {
                id: 3,
                title: "Олимпиада по математике",
                content: "Приглашаем учащихся 9-11 классов принять участие в школьном этапе олимпиады по математике. Олимпиада пройдёт 30 января в кабинете 203.",
                category: "students",
                type: "event",
                author: "Сидорова Е.В.",
                position: "Учитель математики",
                authorInitials: "ЕС",
                date: "22 января 2024",
                pinned: false,
                urgent: false
            },
            {
                id: 4,
                title: "Методический совет",
                content: "Совещание для учителей начальных классов состоится 26 января в 15:00 в учительской. Тема: 'Обновление учебных планов на 2024-2025 учебный год'.",
                category: "teachers",
                type: "announcement",
                author: "Козлова Т.П.",
                position: "Методист",
                authorInitials: "ТК",
                date: "23 января 2024",
                pinned: true,
                urgent: false
            },
            {
                id: 5,
                title: "Конкурс чтецов",
                content: "Школьный этап конкурса 'Живая классика' состоится 15 февраля в актовом зале. Регистрация участников до 10 февраля.",
                category: "students",
                type: "event",
                author: "Николаева Л.М.",
                position: "Учитель литературы",
                authorInitials: "ЛН",
                date: "21 января 2024",
                pinned: false,
                urgent: false
            },
            {
                id: 6,
                title: "Новое расписание",
                content: "С 1 февраля вводится новое расписание уроков. Расписание доступно в соответствующем разделе портала.",
                category: "teachers",
                type: "news",
                author: "Васильев А.С.",
                position: "Завуч",
                authorInitials: "АВ",
                date: "19 января 2024",
                pinned: false,
                urgent: false
            }
        ];

        // СОСТОЯНИЕ
        let state = {
            category: 'all',
            type: 'all',
            urgent: false,
            pinned: false,
            search: ''
        };

        // ЭЛЕМЕНТЫ
        const elements = {
            searchInput: document.getElementById('searchInput'),
            filterPills: document.querySelectorAll('.filter-pill'),
            pinnedList: document.getElementById('pinnedList'),
            announcementsList: document.getElementById('announcementsList'),
            emptyState: document.getElementById('emptyState'),
            modalOverlay: document.getElementById('modalOverlay'),
            modalClose: document.getElementById('modalClose'),
            modalTitle: document.getElementById('modalTitle'),
            modalAvatar: document.getElementById('modalAvatar'),
            modalAuthor: document.getElementById('modalAuthor'),
            modalPosition: document.getElementById('modalPosition'),
            modalDate: document.getElementById('modalDate'),
            modalTags: document.getElementById('modalTags'),
            modalContent: document.getElementById('modalContent')
        };

        // ИНИЦИАЛИЗАЦИЯ
        document.addEventListener('DOMContentLoaded', function() {
            renderAnnouncements();
            
            // Поиск
            elements.searchInput.addEventListener('input', function(e) {
                state.search = e.target.value.toLowerCase().trim();
                renderAnnouncements();
            });
            
            // Фильтры
            elements.filterPills.forEach(pill => {
                pill.addEventListener('click', function() {
                    const filter = this.dataset.filter;
                    
                    if (filter === 'all') {
                        elements.filterPills.forEach(p => p.classList.remove('active'));
                        this.classList.add('active');
                        resetFilters();
                    } else {
                        document.querySelector('[data-filter="all"]').classList.remove('active');
                        this.classList.toggle('active');
                        
                        if (filter.startsWith('category:')) {
                            state.category = this.classList.contains('active') ? filter.split(':')[1] : 'all';
                        } else if (filter.startsWith('type:')) {
                            state.type = this.classList.contains('active') ? filter.split(':')[1] : 'all';
                        } else if (filter === 'urgent') {
                            state.urgent = this.classList.contains('active');
                        } else if (filter === 'pinned') {
                            state.pinned = this.classList.contains('active');
                        }
                    }
                    
                    renderAnnouncements();
                });
            });
            
            // Модальное окно
            elements.modalClose.addEventListener('click', closeModal);
            elements.modalOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });
        });

        // ФУНКЦИИ
        function resetFilters() {
            state = {
                category: 'all',
                type: 'all',
                urgent: false,
                pinned: false,
                search: ''
            };
        }

        function filterAnnouncements() {
            return announcementsData.filter(announcement => {
                if (state.search) {
                    const searchQuery = state.search.toLowerCase();
                    const matches = announcement.title.toLowerCase().includes(searchQuery) ||
                                   announcement.content.toLowerCase().includes(searchQuery);
                    if (!matches) return false;
                }
                
                if (state.category !== 'all' && announcement.category !== state.category) {
                    return false;
                }
                
                if (state.type !== 'all' && announcement.type !== state.type) {
                    return false;
                }
                
                if (state.urgent && !announcement.urgent) {
                    return false;
                }
                
                if (state.pinned && !announcement.pinned) {
                    return false;
                }
                
                return true;
            });
        }

        function renderAnnouncements() {
            const filtered = filterAnnouncements();
            const pinned = filtered.filter(a => a.pinned);
            const regular = filtered.filter(a => !a.pinned);
            
            elements.pinnedList.innerHTML = '';
            elements.announcementsList.innerHTML = '';
            
            if (filtered.length === 0) {
                elements.emptyState.style.display = 'block';
                return;
            }
            
            elements.emptyState.style.display = 'none';
            
            pinned.forEach(announcement => {
                elements.pinnedList.innerHTML += createCardHTML(announcement);
            });
            
            regular.forEach(announcement => {
                elements.announcementsList.innerHTML += createCardHTML(announcement);
            });
            
            addCardListeners();
        }

        function createCardHTML(announcement) {
            const cardClass = `announcement-card ${announcement.pinned ? 'pinned' : ''} ${announcement.urgent ? 'urgent' : ''}`;
            const categoryClass = `card-tag category-${announcement.category}`;
            const typeClass = `card-tag type-${announcement.type}`;
            
            const shortContent = announcement.content.length > 120 
                ? announcement.content.substring(0, 120) + '...' 
                : announcement.content;
            
            return `
                <div class="${cardClass}" data-id="${announcement.id}">
                    <div class="card-header">
                        <h3 class="card-title">${announcement.title}</h3>
                        <div class="card-tags">
                            ${announcement.pinned ? '<span class="card-tag status-pinned"><i class="fas fa-thumbtack"></i></span>' : ''}
                            ${announcement.urgent ? '<span class="card-tag status-urgent"><i class="fas fa-bolt"></i></span>' : ''}
                            <span class="${categoryClass}">${getCategoryLabel(announcement.category)}</span>
                            <span class="${typeClass}">${getTypeLabel(announcement.type)}</span>
                        </div>
                    </div>
                    <p class="card-content">${shortContent}</p>
                    <div class="card-footer">
                        <div class="author-info">
                            <div class="author-avatar">${announcement.authorInitials}</div>
                            <div class="author-details">
                                <h4>${announcement.author}</h4>
                                <p>${announcement.position}</p>
                            </div>
                        </div>
                        <div class="card-date">
                            <i class="far fa-calendar"></i>
                            ${announcement.date}
                        </div>
                    </div>
                </div>
            `;
        }

        function getCategoryLabel(category) {
            const labels = {
                'students': 'Ученикам',
                'teachers': 'Учителям',
                'parents': 'Родителям'
            };
            return labels[category] || category;
        }

        function getTypeLabel(type) {
            const labels = {
                'announcement': 'Объявление',
                'news': 'Новость',
                'event': 'Мероприятие'
            };
            return labels[type] || type;
        }

        function addCardListeners() {
            document.querySelectorAll('.announcement-card').forEach(card => {
                card.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const announcement = announcementsData.find(a => a.id === id);
                    if (announcement) {
                        openModal(announcement);
                    }
                });
            });
        }

        function openModal(announcement) {
            elements.modalTitle.textContent = announcement.title;
            elements.modalAvatar.textContent = announcement.authorInitials;
            elements.modalAuthor.textContent = announcement.author;
            elements.modalPosition.textContent = announcement.position;
            elements.modalDate.textContent = announcement.date;
            elements.modalContent.innerHTML = `<p>${announcement.content}</p>`;
            
            let tagsHTML = '';
            tagsHTML += `<span class="card-tag category-${announcement.category}">${getCategoryLabel(announcement.category)}</span>`;
            tagsHTML += `<span class="card-tag type-${announcement.type}">${getTypeLabel(announcement.type)}</span>`;
            if (announcement.pinned) {
                tagsHTML += '<span class="card-tag status-pinned"><i class="fas fa-thumbtack"></i></span>';
            }
            if (announcement.urgent) {
                tagsHTML += '<span class="card-tag status-urgent"><i class="fas fa-bolt"></i></span>';
            }
            elements.modalTags.innerHTML = tagsHTML;
            
            elements.modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            elements.modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        // Добавь этот код в файл announcements.html в тег <script>

document.addEventListener('DOMContentLoaded', function() {
    // Получаем параметр фильтра из URL
    const urlParams = new URLSearchParams(window.location.search);
    const filterParam = urlParams.get('filter');
    
    if (filterParam) {
        console.log('Фильтр из URL:', filterParam);
        
        // Автоматически активируем соответствующую кнопку фильтра
        const filterButtons = document.querySelectorAll('.filter-pill');
        
        filterButtons.forEach(button => {
            if (button.getAttribute('data-filter') === filterParam) {
                // Сначала сбросим все фильтры
                if (filterParam !== 'all') {
                    document.querySelector('[data-filter="all"]').classList.remove('active');
                }
                
                // Активируем нужную кнопку
                button.classList.add('active');
                
                // Применяем фильтр
                if (filterParam.startsWith('category:')) {
                    const category = filterParam.split(':')[1];
                    state.category = category;
                } else if (filterParam.startsWith('type:')) {
                    const type = filterParam.split(':')[1];
                    state.type = type;
                } else if (filterParam === 'urgent') {
                    state.urgent = true;
                } else if (filterParam === 'pinned') {
                    state.pinned = true;
                }
                
                // Применяем фильтр к объявлениям
                setTimeout(() => {
                    renderAnnouncements();
                    
                    // Прокручиваем к фильтрам
                    const filtersSection = document.querySelector('.filters-section');
                    if (filtersSection) {
                        filtersSection.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 100);
            }
        });
    }
    
    // Также обрабатываем старый формат параметров (если у тебя был ?category=...)
    const categoryParam = urlParams.get('category');
    if (categoryParam && !filterParam) {
        const categoryMap = {
            'students': 'category:students',
            'teachers': 'category:teachers', 
            'parents': 'category:parents'
        };
        
        if (categoryMap[categoryParam]) {
            // Перенаправляем на новый формат
            window.location.href = `announcements.html?filter=${categoryMap[categoryParam]}`;
        }
    }
});
    </script>
