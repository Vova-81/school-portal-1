<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Школьный портал</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Kurale&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: url('images/Обои\ 8.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
        }
        
        /* Полупрозрачный слой поверх фона */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(3px);
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 
                0 20px 40px -15px rgba(0, 0, 0, 0.3),
                0 0 0 2px rgba(59, 130, 246, 0.1),
                0 0 0 4px rgba(59, 130, 246, 0.05);
            transition: box-shadow 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 
                0 25px 50px -15px rgba(0, 0, 0, 0.4),
                0 0 0 3px rgba(59, 130, 246, 0.2),
                0 0 0 6px rgba(59, 130, 246, 0.1);
        }
        
        /* Стиль для текста "Школьный портал" в стиле Байта */
        .byte-title {
            font-family: 'Kurale', serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60A5FA, #3B82F6, #1E3A8A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }
        
        .byte-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 10%;
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #3B82F6, #60A5FA, #3B82F6, transparent);
            border-radius: 3px;
        }
        
        /* Обводка вокруг лого в стиле Байта */
        .logo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }
        
        .logo-byte-ring {
            position: absolute;
            inset: -5px;
            border: 3px solid transparent;
            border-top-color: #60A5FA;
            border-right-color: #3B82F6;
            border-bottom-color: #1E3A8A;
            border-left-color: #93C5FD;
            border-radius: 50%;
            animation: byteSpin 3s linear infinite;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        
        .logo-byte-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border: 2px solid transparent;
            border-top-color: rgba(96, 165, 250, 0.3);
            border-right-color: rgba(59, 130, 246, 0.3);
            border-bottom-color: rgba(30, 58, 138, 0.3);
            border-left-color: rgba(147, 197, 253, 0.3);
            border-radius: 50%;
            animation: byteSpinReverse 4s linear infinite;
        }
        
        @keyframes byteSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes byteSpinReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        
        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 10px 30px -5px rgba(59, 130, 246, 0.3);
        }
        
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .input-field:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: white;
        }
        
        .input-icon {
            transition: all 0.3s ease;
        }
        
        .input-field:focus + .input-icon,
        .input-field:focus ~ .input-icon {
            color: #3B82F6;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #3B82F6, #1E3A8A);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px #3B82F6;
        }
        
        .demo-btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }
        
        .demo-btn:hover {
            background: white;
            border-color: #3B82F6;
            box-shadow: 0 5px 15px -5px #3B82F6;
        }
        
        .info-box {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(30, 58, 138, 0.1));
            border: 1px solid rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(5px);
        }
        
        /* Уведомления в стиле Байта */
        .byte-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #3B82F6, #1E3A8A);
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: 
                0 10px 30px -5px rgba(59, 130, 246, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            animation: byteNotification 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-left: 4px solid white;
        }
        
        .byte-notification.error {
            background: linear-gradient(135deg, #EF4444, #B91C1C);
            box-shadow: 0 10px 30px -5px rgba(239, 68, 68, 0.5);
        }
        
        .byte-notification i {
            font-size: 1.5rem;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.2));
        }
        
        .byte-notification .notification-content {
            display: flex;
            flex-direction: column;
        }
        
        .byte-notification .notification-title {
            font-size: 0.9rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .byte-notification .notification-message {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .byte-notification .notification-close {
            margin-left: 20px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }
        
        .byte-notification .notification-close:hover {
            opacity: 1;
        }
        
        @keyframes byteNotification {
            0% {
                transform: translateX(100%) scale(0.8);
                opacity: 0;
            }
            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }
        
        .byte-notification.fade-out {
            animation: byteNotificationFade 0.3s ease forwards;
        }
        
        @keyframes byteNotificationFade {
            to {
                transform: translateX(100%) scale(0.8);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6">
    
    <div class="container w-full max-w-md">
        <div class="card p-8 sm:p-10 md:pt-12 md:pb-10 md:px-10">
            
            <!-- Логотип и заголовок в стиле Байта -->
            <div class="flex flex-col items-center text-center space-y-6 sm:space-y-8 mb-6">
                <div class="logo-wrapper">
                    <div class="logo-byte-ring"></div>
                    <img class="logo-image" 
                         alt="Школьный портал" 
                         src="images/logo.png">
                </div>
                
                <div class="space-y-2 sm:space-y-3">
                    <h1 class="byte-title">
                        Школьный портал
                    </h1>
                    <p class="text-gray-600 text-sm sm:text-base font-medium">
                        Вход в панель управления
                    </p>
                </div>
            </div>

            <!-- Форма входа -->
            <form id="loginForm" class="space-y-5 sm:space-y-6">
                <!-- Логин поле -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 block text-center" for="username">
                        Логин
                    </label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 input-icon"></i>
                        <input type="text" 
                               class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-base outline-none transition-all"
                               id="username" 
                               placeholder="Введите ваш логин" 
                               required>
                    </div>
                </div>

                <!-- Пароль поле -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 block text-center" for="password">
                        Пароль
                    </label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 input-icon"></i>
                        <input type="password" 
                               class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-base outline-none transition-all"
                               id="password" 
                               placeholder="••••••••" 
                               required>
                    </div>
                </div>

                <!-- Кнопка Вход -->
                <button type="submit" 
                        class="submit-btn w-full py-3.5 rounded-xl text-white font-semibold text-lg shadow-lg
                               flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-sign-in-alt"></i>
                    Войти в систему
                </button>

                <!-- Информация для входа -->
                <div class="info-box text-center p-4 rounded-xl mt-4">
                    <p class="text-sm font-semibold text-[#3B82F6] flex items-center justify-center gap-1">
                        <i class="fas fa-info-circle"></i>
                        Для входа используйте:
                    </p>
                    <div class="flex items-center justify-center gap-3 mt-2 text-sm">
                        <span class="px-3 py-1 bg-white rounded-full shadow-sm border border-[#3B82F6]">
                            <span class="font-bold text-[#3B82F6]">director</span>
                        </span>
                        <i class="fas fa-arrow-right text-gray-400"></i>
                        <span class="px-3 py-1 bg-white rounded-full shadow-sm border border-[#3B82F6]">
                            <span class="font-bold text-[#1E3A8A]">admin123</span>
                        </span>
                    </div>
                </div>
            </form>
            
            <!-- Демо кнопки -->
            <div class="mt-6 space-y-2">
                <button onclick="fillDemo('director')" 
                        class="demo-btn w-full py-3 px-4 rounded-xl text-gray-700 font-medium
                               flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-crown text-[#3B82F6]"></i>
                    Войти как Директор
                </button>
                <button onclick="fillDemo('deputy')" 
                        class="demo-btn w-full py-3 px-4 rounded-xl text-gray-700 font-medium
                               flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-user-tie text-[#3B82F6]"></i>
                    Войти как Заместитель
                </button>
            </div>
        </div>
    </div>

    <script>
        // ========== ФУНКЦИЯ УВЕДОМЛЕНИЙ В СТИЛЕ БАЙТА ==========
function showByteNotification(message, type = 'success') {
    // Удаляем предыдущее уведомление
    const oldNotification = document.querySelector('.byte-notification');
    if (oldNotification) {
        oldNotification.remove();
    }
    
    const notification = document.createElement('div');
    notification.className = `byte-notification ${type === 'error' ? 'error' : ''}`;
    
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    const title = type === 'success' ? 'УСПЕХ' : 'ОШИБКА';
    
    notification.innerHTML = `
        <i class="fas ${icon}"></i>
        <div class="notification-content">
            <span class="notification-title">${title}</span>
            <span class="notification-message">${message}</span>
        </div>
        <div class="notification-close" onclick="this.parentElement.remove()">
            <i class="fas fa-times"></i>
        </div>
    `;
    
    document.body.appendChild(notification);
    
    // Автоматическое закрытие через 3 секунды
    setTimeout(() => {
        notification.classList.add('fade-out');
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

// ========== КОНФИГУРАЦИЯ ==========
const CONFIG = {
    API_BASE_URL: '',
    SESSION: {
        tokenKey: 'authToken',
        userKey: 'user'
    },
    REDIRECT: {
        login: 'login.html',
        admin: 'admin.html',
        index: 'index.html'
    },
    DEMO: {
        enabled: true,
        users: {
            director: {
                username: 'director',
                password: 'admin123',
                role: 'director',
                full_name: 'Директор школы',
                avatar: 'images/character-hero.png'
            },
            deputy: {
                username: 'deputy',
                password: 'admin123',
                role: 'deputy',
                full_name: 'Заместитель директора',
                avatar: 'images/character-hero.png'
            }
        }
    }
};

// ========== СОХРАНЕНИЕ ДАННЫХ АВТОРИЗАЦИИ ==========
function saveAuthData(token, user) {
    // Сохраняем ТОЛЬКО в sessionStorage
    sessionStorage.setItem(CONFIG.SESSION.tokenKey, token);
    sessionStorage.setItem(CONFIG.SESSION.userKey, JSON.stringify(user));
    
    // Удаляем из localStorage чтобы не было конфликтов
    localStorage.removeItem(CONFIG.SESSION.tokenKey);
    localStorage.removeItem(CONFIG.SESSION.userKey);
    
    console.log('✅ Данные авторизации сохранены в sessionStorage');
}

// ========== ПРОВЕРКА АВТОРИЗАЦИИ ПРИ ЗАГРУЗКЕ ==========
function checkAuthOnLoad() {
    // Очищаем localStorage принудительно
    localStorage.removeItem(CONFIG.SESSION.tokenKey);
    localStorage.removeItem(CONFIG.SESSION.userKey);
    
    const token = sessionStorage.getItem(CONFIG.SESSION.tokenKey);
    const userStr = sessionStorage.getItem(CONFIG.SESSION.userKey);
    
    if (token && userStr) {
        try {
            const user = JSON.parse(userStr);
            console.log('✅ Уже авторизован:', user.role);
            
            // Определяем путь перенаправления
            const redirectPath = (user.role === 'director' || user.role === 'deputy') 
                ? CONFIG.REDIRECT.admin 
                : CONFIG.REDIRECT.index;
            
            // Перенаправляем если мы на странице входа
            const currentPage = window.location.pathname.split('/').pop() || 'login.html';
            if (currentPage === 'login.html') {
                console.log('➡️ Перенаправление на:', redirectPath);
                window.location.href = redirectPath;
            }
            return true;
        } catch (e) {
            console.error('Ошибка парсинга пользователя');
            sessionStorage.clear();
        }
    }
    
    return false;
}

// ========== ДЕМО-ВХОД ==========
function demoLogin(role) {
    const demoUser = CONFIG.DEMO.users[role];
    if (!demoUser) return false;
    
    const user = {
        id: Date.now(),
        username: demoUser.username,
        full_name: demoUser.full_name,
        role: demoUser.role,
        avatar: demoUser.avatar
    };
    
    saveAuthData(`demo-token-${demoUser.role}`, user);
    showByteNotification(`Вход выполнен как ${demoUser.full_name}`, 'success');
    
    setTimeout(() => {
        window.location.href = CONFIG.REDIRECT.admin;
    }, 1000);
    
    return true;
}

// ========== ОСНОВНАЯ ФУНКЦИЯ ВХОДА ==========
async function handleLogin(username, password) {
    // Сначала пробуем демо-вход
    for (const [role, demoUser] of Object.entries(CONFIG.DEMO.users)) {
        if (username === demoUser.username && password === demoUser.password) {
            return demoLogin(role);
        }
    }
    
    // Если не демо, пробуем реальный сервер
    try {
        const response = await fetch(`${CONFIG.API_BASE_URL}/api/auth/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(data.error || `Ошибка сервера: ${response.status}`);
        }
        
        if (data.success) {
            saveAuthData(data.token, data.user);
            showByteNotification('Вход выполнен успешно!', 'success');
            
            setTimeout(() => {
                const redirectPath = (data.user.role === 'director' || data.user.role === 'deputy')
                    ? CONFIG.REDIRECT.admin
                    : CONFIG.REDIRECT.index;
                window.location.href = redirectPath;
            }, 1000);
            
            return true;
        } else {
            throw new Error(data.error || 'Ошибка входа');
        }
        
    } catch (error) {
        console.error('❌ Ошибка входа:', error);
        showByteNotification(error.message || 'Ошибка входа', 'error');
        return false;
    }
}

// ========== ИНИЦИАЛИЗАЦИЯ СТРАНИЦЫ ==========
document.addEventListener('DOMContentLoaded', function() {
    console.log('📌 Страница входа загружена');
    
    // Очищаем localStorage при загрузке
    localStorage.clear();
    
    // Проверяем авторизацию
    if (checkAuthOnLoad()) return;
    
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.querySelector('button[type="submit"]');
    
    if (!loginForm || !usernameInput || !passwordInput || !submitBtn) {
        console.error('❌ Не найдены элементы формы');
        return;
    }
    
    // Автозаполнение для демо
    setTimeout(() => {
        if (usernameInput && !usernameInput.value) {
            usernameInput.value = CONFIG.DEMO.users.director.username;
            passwordInput.value = CONFIG.DEMO.users.director.password;
        }
    }, 100);
    
    // Обработчик отправки формы
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        
        console.log('🔄 Попытка входа:', username);
        
        if (!username || !password) {
            showByteNotification('Введите логин и пароль', 'error');
            return;
        }
        
        // Показываем загрузку
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';
        submitBtn.disabled = true;
        
        await handleLogin(username, password);
        
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
    });
});

// ========== ГЛОБАЛЬНЫЕ ФУНКЦИИ ==========

// Функция для демо-кнопок
window.fillDemo = function(role) {
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    
    const demoUser = CONFIG.DEMO.users[role];
    if (demoUser) {
        usernameInput.value = demoUser.username;
        passwordInput.value = demoUser.password;
        showByteNotification(`Данные ${role === 'director' ? 'директора' : 'заместителя'} загружены`, 'success');
    }
};

// Функция выхода
window.logout = function() {
    sessionStorage.clear();
    localStorage.clear();
    showByteNotification('Выход выполнен', 'success');
    setTimeout(() => {
        window.location.href = CONFIG.REDIRECT.login;
    }, 500);
};
    </script>
</body>
</html>
